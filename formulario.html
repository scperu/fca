<!-- ============================================================
FORMULARIO SÚMATE - GLOBAL
============================================================ -->
<div class="sumate__form animate-on-scroll delay-1">
    <form id="formSumate">
        <div class="form-group">
            <label for="nombre">Nombres y Apellidos</label>
            <input type="text" id="nombre" placeholder="Nombres y Apellidos" required />
        </div>
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="Correo Electrónico" required />
        </div>
        <div class="form-group">
            <label for="telefono">Número Telefónico</label>
            <input type="tel" id="telefono" placeholder="987654321" required />
        </div>
        <div class="form-group">
            <label for="direccion">Lugar de Residencia</label>
            <textarea id="direccion" rows="3" placeholder="Distrito / Centro Poblado"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
            <i class="fas fa-handshake"></i> REGISTRARME
        </button>
    </form>
    <div id="formMessage" style="margin-top: 16px; text-align: center; font-weight: 400;"></div>
    <div style="text-align: center; margin-top: 16px;">
        <a href="sumate.html" class="btn btn-outline" style="width: 100%; justify-content: center;">
            <i class="fas fa-arrow-right"></i> Ver más formas de apoyar
        </a>
    </div>
</div>
